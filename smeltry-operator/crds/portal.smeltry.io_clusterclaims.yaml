---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clusterclaims.portal.smeltry.io
spec:
  group: portal.smeltry.io
  names:
    kind: ClusterClaim
    listKind: ClusterClaimList
    plural: clusterclaims
    shortNames:
    - cc
    singular: clusterclaim
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.controlPlaneIP
      name: ControlPlaneIP
      type: string
    - jsonPath: .spec.machineCount
      name: Nodes
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterClaim is the Schema for the clusterclaims API.
          A tenant creates one ClusterClaim to request a Kubernetes cluster on bare metal.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ClusterClaimSpec defines the desired state of ClusterClaim.
              The user fills this; the operator resolves everything else.
            properties:
              addonProfile:
                description: AddonProfile is the name of an AddonProfile in portal-system
                  namespace.
                type: string
              machineClass:
                description: MachineClass is the Netbox device model used to filter
                  available hardware.
                type: string
              machineCount:
                description: MachineCount is the number of worker nodes to allocate.
                minimum: 1
                type: integer
              site:
                description: Site is the Netbox site slug. Resolved to network parameters
                  via SiteConfig.
                type: string
            required:
            - addonProfile
            - machineClass
            - machineCount
            - site
            type: object
          status:
            description: ClusterClaimStatus defines the observed state of ClusterClaim.
            properties:
              allocatedMachineIDs:
                description: AllocatedMachineIDs holds the Netbox device IDs allocated
                  to this cluster.
                items:
                  type: integer
                type: array
              clusterRef:
                description: ClusterRef is a reference to the underlying CAPI Cluster
                  object.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              conditions:
                description: Conditions holds detailed status for each reconciliation
                  step.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              controlPlaneDNS:
                description: ControlPlaneDNS is the DNS name registered in CoreDNS
                  for the control plane.
                type: string
              controlPlaneIP:
                description: ControlPlaneIP is the IP allocated in Netbox IPAM for
                  the kube-apiserver.
                type: string
              kubeconfigSecret:
                description: |-
                  KubeconfigSecret is the name of the Secret in the tenant namespace
                  containing the cluster kubeconfig. Populated when phase=Ready.
                type: string
              netboxIPAMIDs:
                description: NetboxIPAMIDs holds the Netbox IP address IDs to DELETE
                  on finalizer.
                items:
                  type: integer
                type: array
              osdDevices:
                additionalProperties:
                  items:
                    type: string
                  type: array
                description: |-
                  OSDDevices maps Netbox device ID (as string) to a list of block device names
                  tagged as ceph-osd in Netbox inventory items.
                  Example: {"42": ["sdb", "sdc"], "57": ["sdb"]}
                type: object
              phase:
                default: Pending
                description: Phase is the current lifecycle phase.
                type: string
              webhookDNS:
                description: WebhookDNS is the DNS name registered in CoreDNS for
                  the webhook ingress.
                type: string
              webhookIP:
                description: WebhookIP is the IP allocated in Netbox IPAM for the
                  tenant ingress (webhooks).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
