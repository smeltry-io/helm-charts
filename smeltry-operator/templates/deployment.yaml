apiVersion: apps/v1
kind: Deployment
metadata:
  name: smeltry-operator
  namespace: {{ .Values.namespaceName }}
  labels:
    app.kubernetes.io/name: smeltry-operator
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: smeltry-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smeltry-operator
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: smeltry-operator
      terminationGracePeriodSeconds: 30
      containers:
        - name: manager
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.leaderElect }}
            - --log-level={{ .Values.logLevel }}
            - --config-map=smeltry-operator-config
            - --netbox-secret=smeltry-operator-netbox
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --machinecfg-image={{ .Values.machinecfgImage }}
            - --netbox-poll-interval={{ .Values.netbox.pollInterval }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        runAsNonRoot: true
